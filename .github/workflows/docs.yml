name: Docs

# Publish dbt docs (lineage DAG + column docs, exposures included) to GitHub
# Pages on every push to main. DuckDB target, no secrets — same fork-safe
# posture as ci.yml. One-time setup: repo Settings → Pages → Source: GitHub
# Actions. Actions SHA-pinned (see ingest.yml for rationale).
on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write   # deploy-pages OIDC; unrelated to the WIF use in ingest.yml

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
      - run: uv sync --extra dev

      - name: Generate static dbt docs (DuckDB target)
        run: |
          make ensure-raw          # empty raw tables so the project compiles
          make dbt-docs            # dbt deps + docs generate --static

      - name: Package site
        run: |
          mkdir -p _site
          cp dbt/target/index.html _site/
          cp dbt/target/catalog.json _site/
          cp dbt/target/manifest.json _site/
          

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
