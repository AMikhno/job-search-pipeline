name: Docs

# Publish dbt docs (lineage DAG + column docs, exposures included) to GitHub
# Pages on every push to main. DuckDB target, no secrets — same fork-safe
# posture as ci.yml. One-time setup: repo Settings → Pages → Source: GitHub
# Actions. Actions SHA-pinned (see ingest.yml for rationale).
on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write   # deploy-pages OIDC; unrelated to the WIF use in ingest.yml

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
      - run: uv sync --extra dev

      - name: Generate static dbt docs (DuckDB target)
        run: |
          make ensure-raw          # empty raw tables so the project compiles
          make dbt-docs            # dbt deps + docs generate --static

      - name: Package site
        run: |
          mkdir -p _site
          cp dbt/target/index.html _site/index.html

      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
