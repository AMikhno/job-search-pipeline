name: Ingest

# Twice daily, ~09:30 and ~15:00 America/Toronto. GitHub cron is UTC and ignores
# DST, so these drift one hour earlier in winter (harmless for a job digest).
#
# Failure alerting is GitHub-native: a failed run of a scheduled workflow emails
# the workflow's author/actor (no Slack, no webhook to rot — see ADR-0019).
# Warnings surface as run annotations + the step summary, and ride along in the
# email digest when one is sent.
#
# Actions are pinned to commit SHAs, not tags: this workflow holds `id-token:
# write` (WIF), and a hijacked moving tag could exfiltrate the OIDC exchange.
on:
  schedule:
    - cron: "30 13 * * *"   # 09:30 EDT / 08:30 EST
    - cron: "0 19 * * *"    # 15:00 EDT / 14:00 EST
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write           # required for Workload Identity Federation (no stored key)

jobs:
  ingest:
    runs-on: ubuntu-latest
    environment: production  # scopes the secrets below
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
      - run: uv sync --extra dev

      - name: Authenticate to Google Cloud (WIF — no service-account key)
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # The company list targets public job boards, so it's a GitHub Actions
      # *variable* (not a secret). Named COMPANIES_CSV_CONTENT to avoid colliding
      # with the COMPANIES_CSV env var that holds a file *path* (shared/config.py).
      - name: Materialize the private company list
        env:
          COMPANIES_CSV_CONTENT: ${{ vars.COMPANIES_CSV_CONTENT }}
        run: printf '%s' "$COMPANIES_CSV_CONTENT" > config/companies.csv

      - name: Ingest -> BigQuery raw
        env:
          PIPELINE_TARGET: prod
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
          BQ_DATASET: jobs
          BQ_LOCATION: northamerica-northeast2
          HTTP_USER_AGENT: ${{ vars.HTTP_USER_AGENT }}
        run: make ingest

      # Warnings must never be able to fail the run (the old Slack curl could).
      - name: Surface warnings (annotations + run summary)
        if: success()
        run: |
          warns=$(jq -r '.warnings | join(", ")' ingest_summary.json)
          if [ -n "$warns" ]; then
            echo "::warning::Low/zero volume from: $warns"
            echo ":warning: Low/zero volume from: $warns" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fail fast on BigQuery dialect errors (compile, no mutations)
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
        run: |
          make dbt-deps
          cd dbt && uv run dbt compile --target prod

      - name: Transform (bronze -> silver -> gold) on BigQuery
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
        run: make dbt-prod

      - name: Freshness gate (fails the run if a source is stale or empty)
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
        run: make freshness
