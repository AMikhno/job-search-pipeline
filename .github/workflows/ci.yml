name: CI

# Runs on every PR and push. DuckDB dev target only — NO secrets, so it runs
# safely on fork PRs in a public repo, and never touches the private company list.
# Actions are pinned to commit SHAs (see ingest.yml for rationale).
on:
  pull_request:
  push:
    branches: [main]

# Least-privilege token; this workflow only reads the repo (siblings declare
# their own). Superseded runs on the same ref are cancelled to save CI minutes.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
      - run: uv sync --extra dev

      - name: Lint (ruff, mypy, sqlfluff)
        run: make lint

      - name: Python tests (coverage gate enforced)
        run: make test            # fails if coverage < 85% or any test fails

      - name: Build + test dbt on DuckDB (profile is committed in dbt/)
        run: |
          make ensure-raw                       # empty raw tables so models can build
          make dbt-dev                          # dbt deps + dbt build (seeds included)

      # No secrets in this workflow, so the BigQuery target can only be *parsed*
      # (config/contracts/jinja per-target). Full dialect validation happens in
      # ingest.yml, which compiles the prod target before building it.
      - name: Parse the prod (BigQuery) target — no connection needed
        env:
          GCP_PROJECT: ci-fake-project
        run: cd dbt && uv run dbt parse --target prod

  # The local gitleaks pre-commit hook is bypassable (--no-verify); CI is the
  # backstop that actually blocks a leaked secret from merging.
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
        with:
          fetch-depth: 0        # scan full history, not just the tip
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
