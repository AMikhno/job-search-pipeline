name: CI

# Runs on every PR and push. DuckDB dev target only — NO secrets, so it runs
# safely on fork PRs in a public repo, and never touches the private company list.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra dev

      - name: Lint (ruff, mypy, sqlfluff)
        run: make lint

      - name: Python tests (coverage gate enforced)
        run: make test            # fails if coverage < 85% or any test fails

      - name: Build + test dbt on DuckDB (profile is committed in dbt/)
        run: |
          make ensure-raw                       # empty raw tables so models can build
          make dbt-dev                          # dbt deps + dbt build (seeds included)

      # No secrets in this workflow, so the BigQuery target can only be *parsed*
      # (config/contracts/jinja per-target). Full dialect validation happens in
      # ingest.yml, which compiles the prod target before building it.
      - name: Parse the prod (BigQuery) target — no connection needed
        env:
          GCP_PROJECT: ci-fake-project
        run: cd dbt && uv run dbt parse --target prod
