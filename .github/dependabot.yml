version: 2
updates:
  # Keep SHA-pinned GitHub Actions current (bumps the pin + comment on new releases).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    # One batched PR per week instead of one per action.
    groups:
      github-actions:
        patterns: ["*"]
    open-pull-requests-limit: 5
