version: 2
seeds:
  - name: deal_breaker_tech
    description: Technologies whose presence disqualifies a posting (V1 keyword rule).
    columns:
      - name: tech
        description: Word-matched, case-insensitive; keep entries regex-metacharacter-free.
        data_tests: [not_null, unique]
  - name: allowed_locations
    description: >
      Positive Canadian location markers for the V1 filter (word-matched,
      case-insensitive). A posting is kept if its location is null, is bare
      "Remote", or word-matches one of these markers (Canada, Ontario, ON,
      Ottawa, Toronto, Montreal). Word-matched so "ON" hits "Ottawa, ON" but not
      "London"; keep entries regex-metacharacter-free. No country blocklist;
      V2's LLM does true location eligibility.
    columns:
      - name: pattern
        data_tests: [not_null, unique]
  - name: desired_tech
    description: >
      Technologies a good match tends to name. SOFT signal (ADR-0015): silver
      counts how many appear in the posting text (desired_tech_hits) but never
      drops a row. Word-matched, case-insensitive; keep entries
      regex-metacharacter-free.
    columns:
      - name: tech
        data_tests: [not_null, unique]
      - name: note
        description: Why it is on the list (documentation only; unused in SQL).
  - name: desired_titles
    description: >
      Title patterns for targeted roles. SOFT signal (ADR-0015): silver flags
      whether the posting title word-matches one (title_match) but never drops a
      row. Word-matched, case-insensitive; keep entries regex-metacharacter-free.
    columns:
      - name: pattern
        data_tests: [not_null, unique]
      - name: note
        description: What it targets (documentation only; unused in SQL).
