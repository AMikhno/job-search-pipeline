version: 2
seeds:
  - name: deal_breaker_tech
    description: Technologies whose presence disqualifies a posting (V1 keyword rule).
    columns:
      - name: tech
        description: Word-matched, case-insensitive; keep entries regex-metacharacter-free.
        data_tests: [not_null, unique]
  - name: allowed_locations
    description: >
      Positive Canadian location markers for the V1 filter (word-matched,
      case-insensitive). A posting is kept if its location is null, is bare
      "Remote", or word-matches one of these markers (Canada, Ontario, ON,
      Ottawa, Toronto, Montreal). Word-matched so "ON" hits "Ottawa, ON" but not
      "London"; keep entries regex-metacharacter-free. No country blocklist;
      V2's LLM does true location eligibility.
    columns:
      - name: pattern
        data_tests: [not_null, unique]
