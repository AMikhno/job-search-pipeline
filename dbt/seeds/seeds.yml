version: 2
seeds:
  - name: deal_breaker_tech
    description: Technologies whose presence disqualifies a posting (V1 keyword rule).
    columns:
      - name: tech
        description: Word-matched, case-insensitive; keep entries regex-metacharacter-free.
        data_tests: [not_null, unique]
  - name: allowed_locations
    description: Location substrings that pass the V1 location filter.
    columns:
      - name: pattern
        data_tests: [not_null, unique]
  - name: blocked_locations
    description: >
      Location markers that veto a posting even when an allowed pattern matched
      (e.g. "Remote — US only" passes via "Remote" but is not applyable from
      Canada). Word-matched, case-insensitive; keep entries regex-metacharacter-free.
    columns:
      - name: pattern
        data_tests: [not_null, unique]
