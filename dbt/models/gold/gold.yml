version: 2
models:
  - name: fct_job_postings
    description: >
      Curated, deduplicated, rule-filtered postings still live on their boards.
      The V1 output: recency-ranked links to apply to.
    columns:
      - name: job_key
        data_tests: [not_null, unique]
      - name: url
        data_tests: [not_null]
      - name: recency_rank
        data_tests: [not_null, unique]

unit_tests:
  - name: gold_delivers_only_active_postings_ranked_by_recency
    model: fct_job_postings
    given:
      - input: ref('silver_jobs')
        rows:
          - {job_key: newer, url: "https://x/1", is_active: true,
             posted_or_updated_at: 2026-07-02 00:00:00}
          - {job_key: older, url: "https://x/2", is_active: true,
             posted_or_updated_at: 2026-06-01 00:00:00}
          - {job_key: closed, url: "https://x/3", is_active: false,
             posted_or_updated_at: 2026-07-03 00:00:00}
    expect:
      rows:
        - {job_key: newer, recency_rank: 1}
        - {job_key: older, recency_rank: 2}
