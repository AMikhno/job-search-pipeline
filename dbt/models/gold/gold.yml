version: 2
models:
  - name: fct_job_postings
    description: >
      Curated, deduplicated, rule-filtered postings still live on their boards.
      The V1 output: recency-ranked links to apply to.
    # Contract enforced on the DuckDB dev target (see silver_jobs for the rationale).
    config:
      contract:
        enforced: "{{ target.type == 'duckdb' }}"
    columns:
      - name: job_key
        description: Stable posting identity (one row per posting).
        data_type: varchar
        data_tests: [not_null, unique]
      - name: content_hash
        data_type: varchar
      - name: source
        data_type: varchar
      - name: company
        data_type: varchar
      - name: title
        data_type: varchar
      - name: location
        data_type: varchar
      - name: remote_policy
        data_type: varchar
      - name: url
        description: Link out to the original posting.
        data_type: varchar
        data_tests: [not_null]
      - name: posted_or_updated_at
        data_type: timestamp
      - name: ingested_at
        data_type: timestamp
      - name: first_seen_at
        description: Earliest ingest that saw this posting ("new since last run" signal).
        data_type: timestamp
        data_tests: [not_null]
      - name: last_seen_at
        data_type: timestamp
      - name: recency_rank
        description: 1 = most recent by posted_or_updated_at; dense unique ordering for the digest.
        data_type: bigint
        data_tests: [not_null, unique]

unit_tests:
  - name: gold_delivers_only_active_postings_ranked_by_recency
    model: fct_job_postings
    given:
      - input: ref('silver_jobs')
        rows:
          - {job_key: newer, url: "https://x/1", is_active: true,
             posted_or_updated_at: 2026-07-02 00:00:00}
          - {job_key: older, url: "https://x/2", is_active: true,
             posted_or_updated_at: 2026-06-01 00:00:00}
          - {job_key: closed, url: "https://x/3", is_active: false,
             posted_or_updated_at: 2026-07-03 00:00:00}
    expect:
      rows:
        - {job_key: newer, recency_rank: 1}
        - {job_key: older, recency_rank: 2}
