version: 2
models:
  - name: int_jobs__unioned
    description: All sources unioned into one shape, with identity key, change hash, and cleaned text.
    columns:
      - name: job_key
        data_tests: [not_null]
      - name: content_hash
        data_tests: [not_null]
  - name: silver_jobs
    description: >
      Deduplicated, rule-filtered postings ready for V1 delivery / V2 AI, with
      lifecycle columns (last_seen_at / is_active) so taken-down postings are
      distinguishable from live ones.
    columns:
      - name: job_key
        data_tests: [not_null, unique]
      - name: url
        data_tests: [not_null]
      - name: last_seen_at
        data_tests: [not_null]
      - name: is_active
        data_tests: [not_null]
