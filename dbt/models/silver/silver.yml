version: 2
models:
  - name: int_jobs__unioned
    description: All sources unioned into one shape, with identity key, change hash, and cleaned text.
    columns:
      - name: job_key
        description: Surrogate of (source, company, external_id) — stable posting identity.
        data_tests: [not_null]
      - name: content_hash
        description: Surrogate of (title, clean_text); changes when the posting text changes (V2 reprocessing key).
        data_tests: [not_null]
  - name: silver_jobs
    description: >
      Deduplicated, rule-filtered postings ready for V1 delivery / V2 AI, with
      lifecycle columns (first_seen_at / last_seen_at / is_active) so net-new and
      taken-down postings are distinguishable, plus soft match signals
      (desired_tech_hits / title_match) that annotate but never drop (ADR-0015).
    # Contract enforced on the DuckDB dev target — CI builds it on every PR, so
    # column drift and type regressions (e.g. the old cast-null-as-varchar) fail
    # fast. Declared types are DuckDB's; the BigQuery build reports STRING/BOOL/
    # INT64, so enforcement is dev-scoped rather than breaking prod on type names.
    config:
      contract:
        enforced: "{{ target.type == 'duckdb' }}"
    columns:
      - name: job_key
        description: Stable posting identity; silver keeps the latest row per key.
        data_type: varchar
        data_tests: [not_null, unique]
      - name: content_hash
        description: Change-detection hash of (title, clean_text); V2 reprocessing key.
        data_type: varchar
      - name: source
        description: ATS the posting came from ("greenhouse" | "lever" | "ashby").
        data_type: varchar
      - name: company
        description: The board_ref the posting was fetched from.
        data_type: varchar
      - name: external_id
        description: Source-native posting id, as text.
        data_type: varchar
      - name: title
        data_type: varchar
      - name: location
        data_type: varchar
      - name: remote_policy
        data_type: varchar
      - name: department
        data_type: varchar
      - name: employment_type
        data_type: varchar
      - name: url
        description: Link to the live posting.
        data_type: varchar
        data_tests: [not_null]
      - name: description_html
        data_type: varchar
      - name: clean_text
        description: Tag-stripped posting text used by the keyword filter.
        data_type: varchar
      - name: posted_or_updated_at
        data_type: timestamp
      - name: ingested_at
        data_type: timestamp
      - name: first_seen_at
        description: >
          Earliest ingest timestamp that contained this posting; a job_key whose
          first_seen_at is in the current run is net-new ("new since last run").
        data_type: timestamp
        data_tests: [not_null]
      - name: last_seen_at
        description: Most recent ingest timestamp that still contained this posting.
        data_type: timestamp
        data_tests: [not_null]
      - name: desired_tech_hits
        description: >
          Count of desired-tech seed terms word-matched in clean_text. Soft
          signal — annotates, never drops (ADR-0015).
        data_type: bigint
        data_tests: [not_null]
      - name: title_match
        description: >
          True if the title word-matches a desired_titles pattern. Soft signal —
          annotates, never drops (ADR-0015).
        data_type: boolean
        data_tests: [not_null]
      - name: is_active
        description: True while the posting is present in its board's latest ingest.
        data_type: boolean
        data_tests: [not_null]

unit_tests:
  - name: dedup_keeps_the_most_recently_ingested_row
    description: >
      Lever re-ingests tie on posted_or_updated_at (createdAt never changes);
      ingested_at must break the tie so an edited posting surfaces.
    model: silver_jobs
    given:
      - input: ref('int_jobs__unioned')
        rows:
          - {job_key: k1, source: lever, company: acme, title: old title, clean_text: "",
             location: "Ottawa, Canada", ingested_at: 2026-07-01 10:00:00, posted_or_updated_at: 2026-06-01 00:00:00}
          - {job_key: k1, source: lever, company: acme, title: new title, clean_text: "",
             location: "Ottawa, Canada", ingested_at: 2026-07-02 10:00:00, posted_or_updated_at: 2026-06-01 00:00:00}
      - input: ref('deal_breaker_tech')
        rows: []
      - input: ref('allowed_locations')
        rows: [{pattern: Canada}]
      - input: ref('desired_tech')
        rows: []
      - input: ref('desired_titles')
        rows: []
    expect:
      rows:
        - {job_key: k1, title: new title}

  - name: deal_breaker_matches_words_not_substrings
    description: '"Kafka a plus" disqualifies; "Kafkaesque" does not. Case-insensitive.'
    model: silver_jobs
    given:
      - input: ref('int_jobs__unioned')
        rows:
          - {job_key: k1, source: lever, company: acme, title: a, clean_text: We use Kafka daily,
             location: "Ottawa, Canada", ingested_at: 2026-07-02 10:00:00}
          - {job_key: k2, source: lever, company: acme, title: b, clean_text: Kafkaesque bureaucracy,
             location: "Ottawa, Canada", ingested_at: 2026-07-02 10:00:00}
          - {job_key: k3, source: lever, company: acme, title: c, clean_text: knows kafka a plus,
             location: "Ottawa, Canada", ingested_at: 2026-07-02 10:00:00}
      - input: ref('deal_breaker_tech')
        rows: [{tech: Kafka}]
      - input: ref('allowed_locations')
        rows: [{pattern: Canada}]
      - input: ref('desired_tech')
        rows: []
      - input: ref('desired_titles')
        rows: []
    expect:
      rows:
        - {job_key: k2}

  - name: location_gate_keeps_null_bare_remote_and_canada
    description: >
      Keep a posting whose location is null, is bare "Remote", or word-matches a
      Canadian marker (Canada / Ontario / ON / Ottawa / Toronto / Montreal). Drop
      everything else. Word-matched: "ON" hits "Ottawa, ON" but not "London".
    model: silver_jobs
    given:
      - input: ref('int_jobs__unioned')
        rows:
          - {job_key: remote, source: lever, company: acme, title: a, clean_text: "",
             location: Remote, ingested_at: 2026-07-02 10:00:00}
          - {job_key: unknown, source: lever, company: acme, title: b, clean_text: "",
             location: null, ingested_at: 2026-07-02 10:00:00}
          - {job_key: canada, source: lever, company: acme, title: c, clean_text: "",
             location: "Ottawa, ON, Canada", ingested_at: 2026-07-02 10:00:00}
          - {job_key: on_abbrev, source: lever, company: acme, title: d, clean_text: "",
             location: "Ottawa, ON", ingested_at: 2026-07-02 10:00:00}
          - {job_key: toronto, source: lever, company: acme, title: e, clean_text: "",
             location: Toronto, ingested_at: 2026-07-02 10:00:00}
          - {job_key: montreal, source: lever, company: acme, title: f, clean_text: "",
             location: "Montreal, QC", ingested_at: 2026-07-02 10:00:00}
          - {job_key: london, source: lever, company: acme, title: g, clean_text: "",
             location: "London, UK", ingested_at: 2026-07-02 10:00:00}
          - {job_key: foreign, source: lever, company: acme, title: h, clean_text: "",
             location: "Berlin, Germany", ingested_at: 2026-07-02 10:00:00}
          - {job_key: uk_remote, source: lever, company: acme, title: i, clean_text: "",
             location: Remote - United Kingdom, ingested_at: 2026-07-02 10:00:00}
      - input: ref('deal_breaker_tech')
        rows: []
      - input: ref('allowed_locations')
        rows: [{pattern: Canada}, {pattern: Ontario}, {pattern: ON}, {pattern: Ottawa}, {pattern: Toronto}, {pattern: Montreal}]
      - input: ref('desired_tech')
        rows: []
      - input: ref('desired_titles')
        rows: []
    expect:
      rows:
        - {job_key: remote}
        - {job_key: unknown}
        - {job_key: canada}
        - {job_key: on_abbrev}
        - {job_key: toronto}
        - {job_key: montreal}

  - name: posting_missing_from_latest_board_ingest_is_inactive
    description: >
      k2 was seen on 07-01 but not in the board's 07-02 ingest — it was taken
      down. It stays in silver (history) but is_active must be false. Also pins
      first_seen_at to the earliest ingest (k1 first seen 07-01, not 07-02).
    model: silver_jobs
    given:
      - input: ref('int_jobs__unioned')
        rows:
          - {job_key: k1, source: lever, company: acme, title: live, clean_text: "",
             location: "Ottawa, Canada", ingested_at: 2026-07-01 10:00:00}
          - {job_key: k1, source: lever, company: acme, title: live, clean_text: "",
             location: "Ottawa, Canada", ingested_at: 2026-07-02 10:00:00}
          - {job_key: k2, source: lever, company: acme, title: gone, clean_text: "",
             location: "Ottawa, Canada", ingested_at: 2026-07-01 10:00:00}
      - input: ref('deal_breaker_tech')
        rows: []
      - input: ref('allowed_locations')
        rows: [{pattern: Canada}]
      - input: ref('desired_tech')
        rows: []
      - input: ref('desired_titles')
        rows: []
    expect:
      rows:
        - {job_key: k1, is_active: true, first_seen_at: 2026-07-01 10:00:00}
        - {job_key: k2, is_active: false, first_seen_at: 2026-07-01 10:00:00}

  - name: soft_signals_annotate_without_dropping
    description: >
      desired_tech_hits counts desired techs word-matched in clean_text and
      title_match flags a targeted title — but neither drops a row: a posting
      with no desired tech and a non-target title still survives (soft, ADR-0015).
    model: silver_jobs
    given:
      - input: ref('int_jobs__unioned')
        rows:
          - {job_key: hit, source: lever, company: acme, title: Analytics Engineer,
             clean_text: "We use dbt and BigQuery daily", location: "Ottawa, Canada",
             ingested_at: 2026-07-02 10:00:00}
          - {job_key: miss, source: lever, company: acme, title: Office Manager,
             clean_text: "general office administration", location: "Ottawa, Canada",
             ingested_at: 2026-07-02 10:00:00}
      - input: ref('deal_breaker_tech')
        rows: []
      - input: ref('allowed_locations')
        rows: [{pattern: Canada}]
      - input: ref('desired_tech')
        rows: [{tech: dbt}, {tech: BigQuery}]
      - input: ref('desired_titles')
        rows: [{pattern: Analytics}]
    expect:
      rows:
        - {job_key: hit, desired_tech_hits: 2, title_match: true}
        - {job_key: miss, desired_tech_hits: 0, title_match: false}
