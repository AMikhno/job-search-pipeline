name: job_pipeline
version: "0.1.6"
config-version: 2
profile: job_pipeline

model-paths: ["models"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

vars:
  # A board whose latest ingest lags the pipeline's latest by more than this is
  # considered retired (removed from the list, or persistently failing) and its
  # postings go inactive. ~2 missed runs of grace at the twice-daily cadence.
  board_staleness_hours: 36

# Three medallion zones = dbt staging -> intermediate -> marts.
# Folder defaults below; per-model overrides live in-model:
#   - int_jobs__unioned        -> view  (free; ephemeral would block unit tests)
#   - int_jobs_structured/scored (V2) -> incremental (never recompute LLM calls)
models:
  job_pipeline:
    # Push model + column descriptions into the warehouse so BigQuery tables/views
    # are self-documenting (no-op on DuckDB dev, harmless).
    +persist_docs:
      relation: true
      columns: true
    # Each zone lands in its own dataset. dbt's default generate_schema_name
    # concatenates <target dataset>_<+schema>, giving jobs_bronze / jobs_silver /
    # jobs_gold on BigQuery (alongside the jobs_raw / jobs_ops the Python ingest
    # creates) and main_bronze / _silver / _gold on DuckDB dev. See ADR-0014.
    bronze:                       # staging
      +materialized: view
      +schema: bronze
    silver:                       # intermediate zone (several int_ models)
      +materialized: table
      +schema: silver
    gold:                         # marts
      +materialized: table
      +schema: gold

seeds:
  job_pipeline:
    +persist_docs:
      relation: true
      columns: true
